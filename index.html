  <body>
    <div id="root"></div>
    <script>
      // Remove the Replit "Made with Replit" badge so it doesn't overlap app UI.
      // Uses a MutationObserver so it catches badges injected after page load.
      (function () {
        const SELECTORS = [
          '#replit-badge-container',
          '#replit-badge',
          '[id^="replit-badge"]',
          '[class*="replit-badge"]',
          'iframe[src*="replit.com/badge"]',
        ];
        function removeBadge() {
          SELECTORS.forEach(function (sel) {
            document.querySelectorAll(sel).forEach(function (el) {
              el.remove();
            });
          });
        }
        removeBadge();
        var observer = new MutationObserver(removeBadge);
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
