kind = "web"
previewPath = "/"
title = "Portuguese Learning App"
version = "1.0.0"
id = "artifacts/portuguese-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25574

[services.development]
run = "pnpm --filter @workspace/portuguese-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/portuguese-app", "run", "build" ]
publicDir = "artifacts/portuguese-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25574"
BASE_PATH = "/"
