<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Green rounded square background -->
  <rect width="100" height="100" rx="20" ry="20" fill="#046A38"/>

  <!-- Bold yellow P -->
  <text x="8" y="74" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="72" fill="#FFCC29">P</text>

  <!-- White speech / wifi arcs radiating from centre-left dot -->
  <!-- Inner arc -->
  <path d="M 56 54 A 8 10 0 0 1 56 46" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Middle arc -->
  <path d="M 60 59 A 16 19 0 0 1 60 41" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Outer arc -->
  <path d="M 64 64 A 24 28 0 0 1 64 36" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Source dot -->
  <circle cx="52" cy="50" r="4.5" fill="white"/>

  <!-- Two horizontal bars bottom-right -->
  <!-- Blue bar -->
  <rect x="55" y="74" width="33" height="6" rx="3" fill="#1D4ED8"/>
  <!-- Red bar -->
  <rect x="55" y="83" width="33" height="6" rx="3" fill="#DA291C"/>
</svg>
